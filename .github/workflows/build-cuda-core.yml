# Reusable workflow: build cuda.core wheels for one platform.
#
# cuda.core ships a single wheel that supports two CUDA major versions.  The
# two builds (current and previous CUDA) run in parallel; a final merge job
# combines them into the artifact consumed by test and release jobs.
#
# All routing lives in the caller's job graph.  This workflow does exactly:
#   checkout -> sccache -> CTK -> download bindings -> cibuildwheel -> upload
# for each CUDA version, then merges.

on:
  workflow_call:
    inputs:
      host-platform:
        required: true
        type: string
      cuda-version:
        description: "Current CUDA version (e.g. 12.9.0)"
        required: true
        type: string
      prev-cuda-version:
        description: "Previous CUDA major version (e.g. 12.8.0)"
        required: true
        type: string
      bindings-run-id:
        description: "Run ID that produced the cuda-bindings artifacts for the current CUDA version"
        required: true
        type: string
      prev-bindings-run-id:
        description: "Run ID that produced the cuda-bindings artifacts for the previous CUDA version (defaults to bindings-run-id)"
        required: false
        default: ""
        type: string
      git-ref:
        description: "Git ref to check out (defaults to the caller's ref)"
        required: false
        default: ""
        type: string

defaults:
  run:
    shell: bash --noprofile --norc -xeuo pipefail {0}

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Build against the current CUDA major version.
  # ---------------------------------------------------------------------------
  build-current:
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
          - "3.14t"
    name: current-cuda py${{ matrix.python-version }}
    runs-on: ${{ (inputs.host-platform == 'linux-64' && 'linux-amd64-cpu8') ||
                 (inputs.host-platform == 'linux-aarch64' && 'linux-arm64-cpu8') ||
                 (inputs.host-platform == 'win-64' && 'windows-2022') }}
    steps:
      - name: Checkout ${{ github.event.repository.name }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ inputs.git-ref || github.ref }}

      - name: Capture checked-out commit SHA
        run: echo "CHECKED_OUT_SHA=$(git rev-parse HEAD)" >> "${GITHUB_ENV}"

      - name: Enable sccache
        uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad  # 0.0.9

      - name: Add additional GHA cache-related env vars
        uses: actions/github-script@v8
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env['ACTIONS_CACHE_URL'])
            core.exportVariable('ACTIONS_RUNTIME_URL', process.env['ACTIONS_RUNTIME_URL'])

      - name: Setup proxy cache
        uses: nv-gha-runners/setup-proxy-cache@main
        continue-on-error: true
        if: ${{ inputs.host-platform != 'win-64' }}
        with:
          enable-apt: true

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Set up MSVC
        if: ${{ startsWith(inputs.host-platform, 'win') }}
        uses: ilammy/msvc-dev-cmd@v1

      - name: Set up yq (Windows only)
        if: ${{ startsWith(inputs.host-platform, 'win') }}
        env:
          YQ_URL: https://github.com/mikefarah/yq/releases/latest/download/yq_windows_amd64.exe
          YQ_DIR: yq_latest
        shell: pwsh -command ". '{0}'"
        run: |
          mkdir -Force -ErrorAction SilentlyContinue "${env:YQ_DIR}" | Out-Null
          Invoke-WebRequest -UseBasicParsing -OutFile "${env:YQ_DIR}/yq.exe" -Uri "$env:YQ_URL"
          echo "$((Get-Location).Path)\\$env:YQ_DIR" >> $env:GITHUB_PATH
          $env:Path += ";$((Get-Location).Path)\\$env:YQ_DIR"
          yq --version

      - name: Set environment variables
        env:
          CUDA_VER: ${{ inputs.cuda-version }}
          HOST_PLATFORM: ${{ inputs.host-platform }}
          PY_VER: ${{ matrix.python-version }}
          SHA: ${{ env.CHECKED_OUT_SHA }}
        run: |
          ./ci/tools/env-vars build
          echo "SCCACHE_DIR=${HOME}/.cache/sccache" >> "${GITHUB_ENV}"
          echo "SCCACHE_CACHE_SIZE=1G" >> "${GITHUB_ENV}"

      - name: Dump environment
        run: env

      - name: Set up mini CTK (current CUDA)
        uses: ./.github/actions/fetch_ctk
        with:
          host-platform: ${{ inputs.host-platform }}
          cuda-version: ${{ inputs.cuda-version }}

      - name: Download cuda.bindings artifacts (current CUDA)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BASENAME="cuda-bindings-python${PYTHON_VERSION_FORMATTED}-cuda${{ inputs.cuda-version }}-${{ inputs.host-platform }}"
          gh run download "${{ inputs.bindings-run-id }}" \
            -p "${BASENAME}*" \
            -R "${{ github.repository }}"
          mkdir -p "${{ env.CUDA_BINDINGS_ARTIFACTS_DIR }}"
          find ${BASENAME} -name "*.whl" -exec mv {} "${{ env.CUDA_BINDINGS_ARTIFACTS_DIR }}/" \;
          rm -rf ${BASENAME}

      - name: Build cuda.core wheel (current CUDA)
        uses: pypa/cibuildwheel@298ed2fb2c105540f5ed055e8a6ad78d82dd3a7e  # v3.3.1
        with:
          package-dir: ./cuda_core/
          output-dir: ${{ env.CUDA_CORE_ARTIFACTS_DIR }}
        env:
          CIBW_BUILD: ${{ env.CIBW_BUILD }}
          CIBW_ENVIRONMENT_LINUX: >
            CUDA_PATH=/host/${{ env.CUDA_PATH }}
            CUDA_PYTHON_PARALLEL_LEVEL=${{ env.CUDA_PYTHON_PARALLEL_LEVEL }}
            CUDA_CORE_BUILD_MAJOR=${{ env.BUILD_CUDA_MAJOR }}
            PIP_FIND_LINKS=/host/${{ env.CUDA_BINDINGS_ARTIFACTS_DIR }}
            CC="/host/${{ env.SCCACHE_PATH }} cc"
            CXX="/host/${{ env.SCCACHE_PATH }} c++"
            SCCACHE_GHA_ENABLED=true
            ACTIONS_RUNTIME_TOKEN=${{ env.ACTIONS_RUNTIME_TOKEN }}
            ACTIONS_RUNTIME_URL=${{ env.ACTIONS_RUNTIME_URL }}
            ACTIONS_RESULTS_URL=${{ env.ACTIONS_RESULTS_URL }}
            ACTIONS_CACHE_URL=${{ env.ACTIONS_CACHE_URL }}
            ACTIONS_CACHE_SERVICE_V2=${{ env.ACTIONS_CACHE_SERVICE_V2 }}
            SCCACHE_DIR=/host/${{ env.SCCACHE_DIR }}
            SCCACHE_CACHE_SIZE=${{ env.SCCACHE_CACHE_SIZE }}
          CIBW_ENVIRONMENT_WINDOWS: >
            CUDA_PATH="$(cygpath -w ${{ env.CUDA_PATH }})"
            CUDA_PYTHON_PARALLEL_LEVEL=${{ env.CUDA_PYTHON_PARALLEL_LEVEL }}
            CUDA_CORE_BUILD_MAJOR=${{ env.BUILD_CUDA_MAJOR }}
            PIP_FIND_LINKS="$(cygpath -w ${{ env.CUDA_BINDINGS_ARTIFACTS_DIR }})"
          CIBW_BEFORE_TEST_LINUX: >
            "/host${{ env.SCCACHE_PATH }}" --show-stats
          CIBW_TEST_COMMAND: >
            echo "ok!"

      - name: Rename and stage current-CUDA wheel
        run: |
          if [[ "${{ inputs.host-platform }}" == win* ]]; then
            chown -R "$(whoami)" "${{ env.CUDA_CORE_ARTIFACTS_DIR }}"
          else
            sudo chown -R "$(whoami)" "${{ env.CUDA_CORE_ARTIFACTS_DIR }}"
          fi
          mkdir -p "${{ env.CUDA_CORE_ARTIFACTS_DIR }}/cu${BUILD_CUDA_MAJOR}"
          for wheel in "${{ env.CUDA_CORE_ARTIFACTS_DIR }}"/*.whl; do
            [[ -f "${wheel}" ]] || continue
            base=$(basename "${wheel}" .whl)
            mv "${wheel}" "${{ env.CUDA_CORE_ARTIFACTS_DIR }}/cu${BUILD_CUDA_MAJOR}/${base}.cu${BUILD_CUDA_MAJOR}.whl"
          done
          ls -lahR "${{ env.CUDA_CORE_ARTIFACTS_DIR }}"

      - name: Upload current-CUDA cuda.core wheel
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: ${{ env.CUDA_CORE_ARTIFACT_NAME }}-cu${{ env.BUILD_CUDA_MAJOR }}
          path: ${{ env.CUDA_CORE_ARTIFACTS_DIR }}/cu${{ env.BUILD_CUDA_MAJOR }}/*.whl
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Build against the previous CUDA major version.
  # ---------------------------------------------------------------------------
  build-prev:
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
          - "3.14t"
    name: prev-cuda py${{ matrix.python-version }}
    runs-on: ${{ (inputs.host-platform == 'linux-64' && 'linux-amd64-cpu8') ||
                 (inputs.host-platform == 'linux-aarch64' && 'linux-arm64-cpu8') ||
                 (inputs.host-platform == 'win-64' && 'windows-2022') }}
    steps:
      - name: Checkout ${{ github.event.repository.name }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ inputs.git-ref || github.ref }}

      - name: Capture checked-out commit SHA
        run: echo "CHECKED_OUT_SHA=$(git rev-parse HEAD)" >> "${GITHUB_ENV}"

      - name: Enable sccache
        uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad  # 0.0.9

      - name: Add additional GHA cache-related env vars
        uses: actions/github-script@v8
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env['ACTIONS_CACHE_URL'])
            core.exportVariable('ACTIONS_RUNTIME_URL', process.env['ACTIONS_RUNTIME_URL'])

      - name: Setup proxy cache
        uses: nv-gha-runners/setup-proxy-cache@main
        continue-on-error: true
        if: ${{ inputs.host-platform != 'win-64' }}
        with:
          enable-apt: true

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Set up MSVC
        if: ${{ startsWith(inputs.host-platform, 'win') }}
        uses: ilammy/msvc-dev-cmd@v1

      - name: Set up yq (Windows only)
        if: ${{ startsWith(inputs.host-platform, 'win') }}
        env:
          YQ_URL: https://github.com/mikefarah/yq/releases/latest/download/yq_windows_amd64.exe
          YQ_DIR: yq_latest
        shell: pwsh -command ". '{0}'"
        run: |
          mkdir -Force -ErrorAction SilentlyContinue "${env:YQ_DIR}" | Out-Null
          Invoke-WebRequest -UseBasicParsing -OutFile "${env:YQ_DIR}/yq.exe" -Uri "$env:YQ_URL"
          echo "$((Get-Location).Path)\\$env:YQ_DIR" >> $env:GITHUB_PATH
          $env:Path += ";$((Get-Location).Path)\\$env:YQ_DIR"
          yq --version

      - name: Set environment variables
        env:
          # Use prev-cuda-version so CUDA_BINDINGS_ARTIFACT_BASENAME references the right CTK.
          CUDA_VER: ${{ inputs.prev-cuda-version }}
          HOST_PLATFORM: ${{ inputs.host-platform }}
          PY_VER: ${{ matrix.python-version }}
          SHA: ${{ env.CHECKED_OUT_SHA }}
        run: |
          ./ci/tools/env-vars build
          echo "SCCACHE_DIR=${HOME}/.cache/sccache" >> "${GITHUB_ENV}"
          echo "SCCACHE_CACHE_SIZE=1G" >> "${GITHUB_ENV}"

      - name: Dump environment
        run: env

      - name: Set up mini CTK (prev CUDA)
        uses: ./.github/actions/fetch_ctk
        with:
          host-platform: ${{ inputs.host-platform }}
          cuda-version: ${{ inputs.prev-cuda-version }}
          cuda-path: "./cuda_toolkit_prev"

      - name: Download cuda.bindings artifacts (prev CUDA)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PREV_RUN_ID="${{ inputs.prev-bindings-run-id || inputs.bindings-run-id }}"
          BASENAME="cuda-bindings-python${PYTHON_VERSION_FORMATTED}-cuda${{ inputs.prev-cuda-version }}-${{ inputs.host-platform }}"

          if [[ -z "${{ inputs.prev-bindings-run-id }}" ]]; then
            # prev CUDA bindings come from the backport branch
            OLD_BRANCH=$(yq '.backport_branch' ci/versions.yml)
            PREV_RUN_ID=$(gh run list \
              -b "${OLD_BRANCH}" -L 1 -w "ci.yml" -s success \
              -R "${{ github.repository }}" \
              --json databaseId | jq -r '.[0].databaseId // empty')
            if [[ -z "${PREV_RUN_ID}" ]]; then
              echo "No successful CI run found on backport branch ${OLD_BRANCH}" >&2
              exit 1
            fi
          fi

          gh run download "${PREV_RUN_ID}" \
            -p "${BASENAME}*" \
            -R "${{ github.repository }}"
          mkdir -p "${{ env.CUDA_BINDINGS_ARTIFACTS_DIR }}"
          find ${BASENAME} -name "*.whl" -exec mv {} "${{ env.CUDA_BINDINGS_ARTIFACTS_DIR }}/" \;
          rm -rf ${BASENAME}

      - name: Build cuda.core wheel (prev CUDA)
        uses: pypa/cibuildwheel@298ed2fb2c105540f5ed055e8a6ad78d82dd3a7e  # v3.3.1
        with:
          package-dir: ./cuda_core/
          output-dir: ${{ env.CUDA_CORE_ARTIFACTS_DIR }}
        env:
          CIBW_BUILD: ${{ env.CIBW_BUILD }}
          CIBW_ENVIRONMENT_LINUX: >
            CUDA_PATH=/host/${{ env.CUDA_PATH }}
            CUDA_PYTHON_PARALLEL_LEVEL=${{ env.CUDA_PYTHON_PARALLEL_LEVEL }}
            CUDA_CORE_BUILD_MAJOR=${{ env.BUILD_CUDA_MAJOR }}
            PIP_FIND_LINKS=/host/${{ env.CUDA_BINDINGS_ARTIFACTS_DIR }}
            CC="/host/${{ env.SCCACHE_PATH }} cc"
            CXX="/host/${{ env.SCCACHE_PATH }} c++"
            SCCACHE_GHA_ENABLED=true
            ACTIONS_RUNTIME_TOKEN=${{ env.ACTIONS_RUNTIME_TOKEN }}
            ACTIONS_RUNTIME_URL=${{ env.ACTIONS_RUNTIME_URL }}
            ACTIONS_RESULTS_URL=${{ env.ACTIONS_RESULTS_URL }}
            ACTIONS_CACHE_URL=${{ env.ACTIONS_CACHE_URL }}
            ACTIONS_CACHE_SERVICE_V2=${{ env.ACTIONS_CACHE_SERVICE_V2 }}
            SCCACHE_DIR=/host/${{ env.SCCACHE_DIR }}
            SCCACHE_CACHE_SIZE=${{ env.SCCACHE_CACHE_SIZE }}
          CIBW_ENVIRONMENT_WINDOWS: >
            CUDA_PATH="$(cygpath -w ${{ env.CUDA_PATH }})"
            CUDA_PYTHON_PARALLEL_LEVEL=${{ env.CUDA_PYTHON_PARALLEL_LEVEL }}
            CUDA_CORE_BUILD_MAJOR=${{ env.BUILD_CUDA_MAJOR }}
            PIP_FIND_LINKS="$(cygpath -w ${{ env.CUDA_BINDINGS_ARTIFACTS_DIR }})"
          CIBW_BEFORE_TEST_LINUX: >
            "/host${{ env.SCCACHE_PATH }}" --show-stats
          CIBW_TEST_COMMAND: >
            echo "ok!"

      - name: Rename and stage prev-CUDA wheel
        run: |
          if [[ "${{ inputs.host-platform }}" == win* ]]; then
            chown -R "$(whoami)" "${{ env.CUDA_CORE_ARTIFACTS_DIR }}"
          else
            sudo chown -R "$(whoami)" "${{ env.CUDA_CORE_ARTIFACTS_DIR }}"
          fi
          mkdir -p "${{ env.CUDA_CORE_ARTIFACTS_DIR }}/cu${BUILD_CUDA_MAJOR}"
          for wheel in "${{ env.CUDA_CORE_ARTIFACTS_DIR }}"/*.whl; do
            [[ -f "${wheel}" ]] || continue
            base=$(basename "${wheel}" .whl)
            mv "${wheel}" "${{ env.CUDA_CORE_ARTIFACTS_DIR }}/cu${BUILD_CUDA_MAJOR}/${base}.cu${BUILD_CUDA_MAJOR}.whl"
          done
          ls -lahR "${{ env.CUDA_CORE_ARTIFACTS_DIR }}"

      - name: Upload prev-CUDA cuda.core wheel
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: ${{ env.CUDA_CORE_ARTIFACT_NAME }}-cu${{ env.BUILD_CUDA_MAJOR }}
          path: ${{ env.CUDA_CORE_ARTIFACTS_DIR }}/cu${{ env.BUILD_CUDA_MAJOR }}/*.whl
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Merge the two per-CUDA wheels into the final multi-CUDA artifact.
  # ---------------------------------------------------------------------------
  merge:
    needs: [build-current, build-prev]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
          - "3.14t"
    name: merge py${{ matrix.python-version }}
    steps:
      - name: Checkout ${{ github.event.repository.name }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ inputs.git-ref || github.ref }}

      - name: Capture checked-out commit SHA
        run: echo "CHECKED_OUT_SHA=$(git rev-parse HEAD)" >> "${GITHUB_ENV}"

      - name: Set environment variables
        env:
          CUDA_VER: ${{ inputs.cuda-version }}
          HOST_PLATFORM: ${{ inputs.host-platform }}
          PY_VER: ${{ matrix.python-version }}
          SHA: ${{ env.CHECKED_OUT_SHA }}
        run: ./ci/tools/env-vars build

      - name: Download current-CUDA wheel
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3  # v8.0.0
        with:
          name: ${{ env.CUDA_CORE_ARTIFACT_NAME }}-cu${{ env.BUILD_CUDA_MAJOR }}
          path: current-cu

      - name: Download prev-CUDA wheel
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3  # v8.0.0
        with:
          name: ${{ env.CUDA_CORE_ARTIFACT_NAME }}-cu${{ env.BUILD_PREV_CUDA_MAJOR }}
          path: prev-cu

      - name: Set up Python for merge script
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Merge cuda.core wheels
        run: |
          pip install wheel twine
          mkdir -p "${{ env.CUDA_CORE_ARTIFACTS_DIR }}"
          python ci/tools/merge_cuda_core_wheels.py \
            current-cu/cuda_core*.whl \
            prev-cu/cuda_core*.whl \
            --output-dir "${{ env.CUDA_CORE_ARTIFACTS_DIR }}"
          twine check --strict "${{ env.CUDA_CORE_ARTIFACTS_DIR }}"/*.whl
          ls -lahR "${{ env.CUDA_CORE_ARTIFACTS_DIR }}"

      - name: Upload merged cuda.core artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: ${{ env.CUDA_CORE_ARTIFACT_NAME }}
          path: ${{ env.CUDA_CORE_ARTIFACTS_DIR }}/*.whl
          if-no-files-found: error
