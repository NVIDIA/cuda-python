# Note: This name is referred to in build-cuda-core.yml when fetching backport-branch
# bindings artifacts, so keep it in sync with any renames.
name: "CI"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

on:
  push:
    branches:
      - "pull-request/[0-9]+"
      - "main"
  schedule:
    # every 24 hours at midnight UTC
    - cron: "0 0 * * *"

jobs:
  ci-vars:
    runs-on: ubuntu-latest
    outputs:
      CUDA_BUILD_VER: ${{ steps.get-vars.outputs.cuda_build_ver }}
      CUDA_PREV_BUILD_VER: ${{ steps.get-vars.outputs.cuda_prev_build_ver }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
      - name: Get CUDA build versions
        id: get-vars
        run: |
          cuda_build_ver=$(yq '.cuda.build.version' ci/versions.yml)
          echo "cuda_build_ver=${cuda_build_ver}" >> "${GITHUB_OUTPUT}"
          cuda_prev_build_ver=$(yq '.cuda.prev_build.version' ci/versions.yml)
          echo "cuda_prev_build_ver=${cuda_prev_build_ver}" >> "${GITHUB_OUTPUT}"

  should-skip:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.get-should-skip.outputs.skip }}
      doc-only: ${{ steps.get-should-skip.outputs.doc_only }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Compute whether to skip builds and tests
        id: get-should-skip
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euxo pipefail
          if ${{ startsWith(github.ref_name, 'pull-request/') }}; then
            pr_number="$(grep -Po '(\d+)$' <<< '${{ github.ref_name }}')"
            pr_title="$(gh pr view "${pr_number}" --json title --jq '.title')"
            skip="$(echo "${pr_title}" | grep -q '\[no-ci\]' && echo true || echo false)"
            doc_only="$(echo "${pr_title}" | grep -q '\[doc-only\]' && echo true || echo false)"
          else
            skip=false
            doc_only=false
          fi
          echo "skip=${skip}" >> "${GITHUB_OUTPUT}"
          echo "doc_only=${doc_only}" >> "${GITHUB_OUTPUT}"

  # ---------------------------------------------------------------------------
  # Wheel builds.
  # ---------------------------------------------------------------------------

  # Pure-Python pathfinder is built on linux-64 only. The bindings build also
  # emits the cuda-python metapackage on linux-64.
  build-pathfinder:
    needs: [ci-vars, should-skip]
    if: ${{ github.repository_owner == 'nvidia' && !fromJSON(needs.should-skip.outputs.skip) }}
    secrets: inherit
    uses: ./.github/workflows/build-wheel.yml
    with:
      host-platform: linux-64
      cuda-version: ${{ needs.ci-vars.outputs.CUDA_BUILD_VER }}
      component: cuda-pathfinder

  build-bindings:
    needs: [ci-vars, should-skip]
    strategy:
      fail-fast: false
      matrix:
        host-platform: ${{ fromJSON(fromJSON(needs.should-skip.outputs.doc-only) && '["linux-64"]' || '["linux-64","linux-aarch64","win-64"]') }}
    name: Build ${{ matrix.host-platform }}, cuda.bindings, CUDA ${{ needs.ci-vars.outputs.CUDA_BUILD_VER }}
    if: ${{ github.repository_owner == 'nvidia' && !fromJSON(needs.should-skip.outputs.skip) }}
    secrets: inherit
    uses: ./.github/workflows/build-wheel.yml
    with:
      host-platform: ${{ matrix.host-platform }}
      cuda-version: ${{ needs.ci-vars.outputs.CUDA_BUILD_VER }}
      component: cuda-bindings

  # cuda.core needs the current-run bindings artifacts; its reusable workflow
  # handles the current/previous CUDA split and final merge internally.
  build-cuda-core:
    needs: [ci-vars, should-skip, build-bindings]
    strategy:
      fail-fast: false
      matrix:
        host-platform: ${{ fromJSON(fromJSON(needs.should-skip.outputs.doc-only) && '["linux-64"]' || '["linux-64","linux-aarch64","win-64"]') }}
    name: Build ${{ matrix.host-platform }}, cuda.core, CUDA ${{ needs.ci-vars.outputs.CUDA_BUILD_VER }}
    if: ${{ github.repository_owner == 'nvidia' && !fromJSON(needs.should-skip.outputs.skip) }}
    secrets: inherit
    uses: ./.github/workflows/build-cuda-core.yml
    with:
      host-platform: ${{ matrix.host-platform }}
      cuda-version: ${{ needs.ci-vars.outputs.CUDA_BUILD_VER }}
      prev-cuda-version: ${{ needs.ci-vars.outputs.CUDA_PREV_BUILD_VER }}
      bindings-run-id: ${{ github.run_id }}

  # Cython test artifacts depend on the merged cuda.core wheels plus the
  # bindings/pathfinder artifacts from this same CI run.
  build-cython-tests:
    needs: [ci-vars, should-skip, build-pathfinder, build-bindings, build-cuda-core]
    strategy:
      fail-fast: false
      matrix:
        host-platform:
          - linux-64
          - linux-aarch64
          - win-64
    name: Build Cython tests ${{ matrix.host-platform }}
    if: ${{ github.repository_owner == 'nvidia' &&
            !fromJSON(needs.should-skip.outputs.skip) &&
            !fromJSON(needs.should-skip.outputs.doc-only) }}
    secrets: inherit
    uses: ./.github/workflows/build-cython-tests.yml
    with:
      host-platform: ${{ matrix.host-platform }}
      cuda-version: ${{ needs.ci-vars.outputs.CUDA_BUILD_VER }}
      build-run-id: ${{ github.run_id }}

  # ---------------------------------------------------------------------------
  # Tests consume artifacts from the current CI run after the build matrices
  # finish. They remain split by platform because linux and windows use
  # different reusable test workflows.
  # ---------------------------------------------------------------------------

  test-linux-64:
    needs: [ci-vars, should-skip, build-pathfinder, build-bindings, build-cuda-core, build-cython-tests]
    if: ${{ github.repository_owner == 'nvidia' && !fromJSON(needs.should-skip.outputs.doc-only) }}
    permissions:
      contents: read
    secrets: inherit
    uses: ./.github/workflows/test-wheel-linux.yml
    with:
      build-type: pull-request
      host-platform: linux-64
      build-ctk-ver: ${{ needs.ci-vars.outputs.CUDA_BUILD_VER }}
      nruns: ${{ (github.event_name == 'schedule' && 100) || 1 }}

  test-linux-aarch64:
    needs: [ci-vars, should-skip, build-pathfinder, build-bindings, build-cuda-core, build-cython-tests]
    if: ${{ github.repository_owner == 'nvidia' && !fromJSON(needs.should-skip.outputs.doc-only) }}
    permissions:
      contents: read
    secrets: inherit
    uses: ./.github/workflows/test-wheel-linux.yml
    with:
      build-type: pull-request
      host-platform: linux-aarch64
      build-ctk-ver: ${{ needs.ci-vars.outputs.CUDA_BUILD_VER }}
      nruns: ${{ (github.event_name == 'schedule' && 100) || 1 }}

  test-windows:
    needs: [ci-vars, should-skip, build-pathfinder, build-bindings, build-cuda-core, build-cython-tests]
    if: ${{ github.repository_owner == 'nvidia' && !fromJSON(needs.should-skip.outputs.doc-only) }}
    permissions:
      contents: read
    secrets: inherit
    uses: ./.github/workflows/test-wheel-windows.yml
    with:
      build-type: pull-request
      host-platform: win-64
      build-ctk-ver: ${{ needs.ci-vars.outputs.CUDA_BUILD_VER }}
      nruns: ${{ (github.event_name == 'schedule' && 100) || 1 }}

  # ---------------------------------------------------------------------------
  # Docs: needs linux-64 artifacts only.
  # ---------------------------------------------------------------------------
  doc:
    name: Docs
    if: ${{ github.repository_owner == 'nvidia' }}
    permissions:
      id-token: write
      contents: write
      pull-requests: write
    needs: [ci-vars, build-pathfinder, build-bindings, build-cuda-core]
    secrets: inherit
    uses: ./.github/workflows/build-docs.yml

  # ---------------------------------------------------------------------------
  # Final gate: checked by branch protection.
  # ---------------------------------------------------------------------------
  checks:
    name: Check job status
    if: always()
    runs-on: ubuntu-latest
    needs:
      - should-skip
      - test-linux-64
      - test-linux-aarch64
      - test-windows
      - doc
    steps:
      - name: Exit
        run: |
          # if any dependencies were cancelled or failed, that's a failure
          #
          # see https://docs.github.com/en/actions/reference/workflows-and-actions/expressions#always
          # and https://docs.github.com/en/pull-requests/collaborating-with-pull-requests/collaborating-on-repositories-with-code-quality-features/troubleshooting-required-status-checks#handling-skipped-but-required-checks
          # for why this cannot be encoded in the job-level `if:` field
          doc_only=${{ needs.should-skip.outputs.doc-only }}
          if ${{ needs.doc.result == 'cancelled' || needs.doc.result == 'failure' }}; then
            exit 1
          fi
          if [[ "${doc_only}" != "true" ]]; then
            if ${{ needs.test-linux-64.result == 'cancelled' ||
                   needs.test-linux-64.result == 'failure' ||
                   needs.test-linux-aarch64.result == 'cancelled' ||
                   needs.test-linux-aarch64.result == 'failure' ||
                   needs.test-windows.result == 'cancelled' ||
                   needs.test-windows.result == 'failure' }}; then
              exit 1
            fi
          fi
          exit 0
