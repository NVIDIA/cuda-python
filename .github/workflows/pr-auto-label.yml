name: "CI: Auto-label PRs by path"

on:
  pull_request_target:
    types:
      - opened
      - synchronize

jobs:
  auto-label:
    name: Auto-label by changed paths
    if: github.repository_owner == 'NVIDIA'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Apply labels
        uses: actions/labeler@634933edcd8ababfe52f92936142cc22ac488b1b  # v6.0.1
