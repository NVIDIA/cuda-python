name: "CI: Release"

# Manually-triggered release workflow. Builds release artifacts from the tag in
# this workflow run after verifying the tagged commit already passed main CI,
# then publishes the selected wheels to TestPyPI followed by PyPI.

on:
  workflow_dispatch:
    inputs:
      component:
        description: "Component to release"
        required: true
        type: choice
        options:
          - cuda-core
          - cuda-bindings
      git-tag:
        description: "The release git tag"
        required: true
        type: string

defaults:
  run:
    shell: bash --noprofile --norc -xeuo pipefail {0}

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      target-component: ${{ steps.plan.outputs.target-component }}
      run-id: ${{ steps.plan.outputs.run-id }}
      cuda-build-ver: ${{ steps.cuda.outputs.cuda-build-ver }}
      cuda-prev-build-ver: ${{ steps.cuda.outputs.cuda-prev-build-ver }}
    steps:
      - name: Verify running on default branch
        run: |
          if [[ "${{ github.ref_name }}" != "${{ github.event.repository.default_branch }}" ]]; then
            echo "::error::This workflow must be triggered from the default branch (${{ github.event.repository.default_branch }}). Got: ${{ github.ref_name }}."
            exit 1
          fi

      - name: Validate component and tag combination
        id: plan
        env:
          COMPONENT_INPUT: ${{ inputs.component }}
          TAG_INPUT: ${{ inputs.git-tag }}
          RUN_ID: ${{ github.run_id }}
        run: |
          case "${TAG_INPUT}" in
            v*)
              if [[ "${COMPONENT_INPUT}" != "cuda-bindings" ]]; then
                echo "::error::Tag ${TAG_INPUT} only supports cuda-bindings releases (cuda-python is built alongside cuda-bindings)."
                exit 1
              fi
              ;;
            cuda-core-v*)
              if [[ "${COMPONENT_INPUT}" != "cuda-core" ]]; then
                echo "::error::Tag ${TAG_INPUT} only supports cuda-core releases."
                exit 1
              fi
              ;;
            *)
              echo "::error::Unsupported tag ${TAG_INPUT}. Use the dedicated cuda-pathfinder release workflow for cuda-pathfinder tags."
              exit 1
              ;;
          esac

          {
            echo "target-component=${COMPONENT_INPUT}"
            echo "run-id=${RUN_ID}"
          } >> "${GITHUB_OUTPUT}"

      - name: Checkout source at release tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          ref: refs/tags/${{ inputs.git-tag }}

      - name: Verify release tag preconditions
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ./ci/tools/verify-release-commit "${{ inputs.git-tag }}" "${{ github.repository }}" "${{ github.event.repository.default_branch }}"

      - name: Read CUDA build versions
        id: cuda
        run: |
          cuda_build_ver=$(yq '.cuda.build.version' ci/versions.yml)
          cuda_prev_build_ver=$(yq '.cuda.prev_build.version' ci/versions.yml)
          {
            echo "cuda-build-ver=${cuda_build_ver}"
            echo "cuda-prev-build-ver=${cuda_prev_build_ver}"
          } >> "${GITHUB_OUTPUT}"

      - name: Check or create draft release for the tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          existing_draft=$(gh release view "${{ inputs.git-tag }}" --repo "${{ github.repository }}" --json isDraft --jq '.isDraft' 2>/dev/null || echo "missing")
          if [[ "${existing_draft}" == "false" ]]; then
            echo "::error::Release ${{ inputs.git-tag }} already exists and is published."
            exit 1
          fi
          if [[ "${existing_draft}" == "true" ]]; then
            exit 0
          fi
          gh release create "${{ inputs.git-tag }}" \
            --draft \
            --repo "${{ github.repository }}" \
            --title "Release ${{ inputs.git-tag }}" \
            --notes "Release ${{ inputs.git-tag }}"

  # cuda-bindings releases publish bindings wheels on all platforms; the
  # reusable workflow also emits the cuda-python metapackage on linux-64.
  # cuda-core releases still need current-run bindings artifacts as an internal
  # dependency, so build-bindings runs for both components.
  build-bindings:
    needs: prepare
    if: ${{ inputs.component == 'cuda-bindings' || inputs.component == 'cuda-core' }}
    strategy:
      fail-fast: false
      matrix:
        host-platform:
          - linux-64
          - linux-aarch64
          - win-64
    name: Build ${{ matrix.host-platform }}, cuda.bindings
    secrets: inherit
    uses: ./.github/workflows/build-wheel.yml
    with:
      host-platform: ${{ matrix.host-platform }}
      cuda-version: ${{ needs.prepare.outputs.cuda-build-ver }}
      component: cuda-bindings
      git-ref: refs/tags/${{ inputs.git-tag }}

  build-cuda-core:
    needs: [prepare, build-bindings]
    if: ${{ inputs.component == 'cuda-core' }}
    strategy:
      fail-fast: false
      matrix:
        host-platform:
          - linux-64
          - linux-aarch64
          - win-64
    name: Build ${{ matrix.host-platform }}, cuda.core
    secrets: inherit
    uses: ./.github/workflows/build-cuda-core.yml
    with:
      host-platform: ${{ matrix.host-platform }}
      cuda-version: ${{ needs.prepare.outputs.cuda-build-ver }}
      prev-cuda-version: ${{ needs.prepare.outputs.cuda-prev-build-ver }}
      bindings-run-id: ${{ github.run_id }}
      git-ref: refs/tags/${{ inputs.git-tag }}

  upload-archive:
    name: Upload source archive
    permissions:
      contents: write
    needs:
      - prepare
      - build-bindings
      - build-cuda-core
    if: ${{ always() &&
            !cancelled() &&
            needs.prepare.result == 'success' &&
            needs.build-bindings.result == 'success' &&
            (inputs.component == 'cuda-bindings' || needs.build-cuda-core.result == 'success') }}
    secrets: inherit
    uses: ./.github/workflows/release-upload.yml
    with:
      git-tag: ${{ inputs.git-tag }}
      run-id: ${{ needs.prepare.outputs.run-id }}
      component: ${{ inputs.component }}

  publish-testpypi:
    name: Publish wheels to TestPyPI
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build-bindings
      - build-cuda-core
    if: ${{ always() &&
            !cancelled() &&
            needs.prepare.result == 'success' &&
            needs.build-bindings.result == 'success' &&
            (inputs.component == 'cuda-bindings' || needs.build-cuda-core.result == 'success') }}
    environment:
      name: testpypi
      url: https://test.pypi.org/p/${{ inputs.component }}/
    permissions:
      id-token: write
    steps:
      - name: Checkout source at release tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          ref: refs/tags/${{ inputs.git-tag }}

      - name: Download component wheels from this release run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./ci/tools/download-wheels "${{ needs.prepare.outputs.run-id }}" "${{ inputs.component }}" "${{ github.repository }}" "dist"

      - name: Validate wheel versions for release tag
        run: |
          ./ci/tools/validate-release-wheels "${{ inputs.git-tag }}" "${{ inputs.component }}" "dist"

      - name: Publish package distributions to TestPyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e  # v1.13.0
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish wheels to PyPI
    runs-on: ubuntu-latest
    needs:
      - prepare
      - publish-testpypi
    environment:
      name: pypi
      url: https://pypi.org/p/${{ inputs.component }}/
    permissions:
      id-token: write
    steps:
      - name: Checkout source at release tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          ref: refs/tags/${{ inputs.git-tag }}

      - name: Download component wheels from this release run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./ci/tools/download-wheels "${{ needs.prepare.outputs.run-id }}" "${{ inputs.component }}" "${{ github.repository }}" "dist"

      - name: Validate wheel versions for release tag
        run: |
          ./ci/tools/validate-release-wheels "${{ inputs.git-tag }}" "${{ inputs.component }}" "dist"

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e  # v1.13.0
