# Reusable workflow: build wheels for one component on one platform.
#
# Callers choose the component; this workflow does exactly one thing per
# matrix row: checkout -> sccache -> (CTK if needed) -> cibuildwheel -> upload.
# All routing decisions live in the caller's job graph, not here.

on:
  workflow_call:
    inputs:
      host-platform:
        required: true
        type: string
      cuda-version:
        required: true
        type: string
      component:
        description: "Which package to build: cuda-bindings | cuda-pathfinder"
        required: true
        type: string
      git-ref:
        description: "Git ref to check out (defaults to the caller's ref)"
        required: false
        default: ""
        type: string

defaults:
  run:
    shell: bash --noprofile --norc -xeuo pipefail {0}

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
          - "3.14t"
    name: py${{ matrix.python-version }}
    runs-on: ${{ (inputs.host-platform == 'linux-64' && 'linux-amd64-cpu8') ||
                 (inputs.host-platform == 'linux-aarch64' && 'linux-arm64-cpu8') ||
                 (inputs.host-platform == 'win-64' && 'windows-2022') }}
    steps:
      - name: Checkout ${{ github.event.repository.name }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ inputs.git-ref || github.ref }}

      - name: Capture checked-out commit SHA
        run: echo "CHECKED_OUT_SHA=$(git rev-parse HEAD)" >> "${GITHUB_ENV}"

      # The env vars ACTIONS_CACHE_SERVICE_V2, ACTIONS_RESULTS_URL, and ACTIONS_RUNTIME_TOKEN
      # are exposed by this action.
      - name: Enable sccache
        uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad  # 0.0.9

      # xref: https://github.com/orgs/community/discussions/42856#discussioncomment-7678867
      - name: Add additional GHA cache-related env vars
        uses: actions/github-script@v8
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env['ACTIONS_CACHE_URL'])
            core.exportVariable('ACTIONS_RUNTIME_URL', process.env['ACTIONS_RUNTIME_URL'])

      - name: Setup proxy cache
        uses: nv-gha-runners/setup-proxy-cache@main
        continue-on-error: true
        if: ${{ inputs.host-platform != 'win-64' }}
        with:
          enable-apt: true

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          # WAR: setup-python is not relocatable, and cibuildwheel hard-wires to 3.12.
          # see https://github.com/actions/setup-python/issues/871
          python-version: "3.12"

      - name: Set up MSVC
        if: ${{ startsWith(inputs.host-platform, 'win') }}
        uses: ilammy/msvc-dev-cmd@v1  # TODO: ask admin to allow pinning commits

      - name: Set up yq (Windows only)
        # GitHub made an unprofessional decision to not provide it in their Windows VMs,
        # see https://github.com/actions/runner-images/issues/7443.
        if: ${{ startsWith(inputs.host-platform, 'win') }}
        env:
          YQ_URL: https://github.com/mikefarah/yq/releases/latest/download/yq_windows_amd64.exe
          YQ_DIR: yq_latest
        shell: pwsh -command ". '{0}'"
        run: |
          mkdir -Force -ErrorAction SilentlyContinue "${env:YQ_DIR}" | Out-Null
          Invoke-WebRequest -UseBasicParsing -OutFile "${env:YQ_DIR}/yq.exe" -Uri "$env:YQ_URL"
          ls -l $env:YQ_DIR
          echo "$((Get-Location).Path)\\$env:YQ_DIR" >> $env:GITHUB_PATH
          $env:Path += ";$((Get-Location).Path)\\$env:YQ_DIR"
          yq --version

      - name: Set environment variables
        env:
          CUDA_VER: ${{ inputs.cuda-version }}
          HOST_PLATFORM: ${{ inputs.host-platform }}
          PY_VER: ${{ matrix.python-version }}
          SHA: ${{ env.CHECKED_OUT_SHA }}
        run: |
          ./ci/tools/env-vars build
          echo "SCCACHE_DIR=${HOME}/.cache/sccache" >> "${GITHUB_ENV}"
          echo "SCCACHE_CACHE_SIZE=1G" >> "${GITHUB_ENV}"

      - name: Dump environment
        run: env

      - name: Install twine
        run: pip install twine

      # -----------------------------------------------------------------------
      # cuda-pathfinder: pure-Python, no CTK needed.
      # We only need one wheel (pure-Python is platform-independent), so build
      # it on linux-64, matrix index 0.
      # -----------------------------------------------------------------------
      - name: Build cuda.pathfinder wheel
        if: ${{ inputs.component == 'cuda-pathfinder' && strategy.job-index == 0 && inputs.host-platform == 'linux-64' }}
        run: |
          pushd cuda_pathfinder
          pip wheel -v --no-deps .
          twine check --strict *.whl
          sudo chown -R "$(whoami)" *.whl
          ls -lahR .
          popd

      - name: Upload cuda.pathfinder wheel artifact
        if: ${{ inputs.component == 'cuda-pathfinder' && strategy.job-index == 0 && inputs.host-platform == 'linux-64' }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: cuda-pathfinder-wheel
          path: cuda_pathfinder/*.whl
          if-no-files-found: error

      # -----------------------------------------------------------------------
      # cuda-bindings: needs CTK, built with cibuildwheel across the full matrix.
      # The linux-64 / first-Python row also builds the pure-Python cuda-python
      # metapackage because it always ships with the same tag as cuda-bindings.
      # -----------------------------------------------------------------------
      - name: Set up mini CTK
        if: ${{ inputs.component == 'cuda-bindings' }}
        uses: ./.github/actions/fetch_ctk
        with:
          host-platform: ${{ inputs.host-platform }}
          cuda-version: ${{ inputs.cuda-version }}

      - name: Build cuda.bindings wheel
        if: ${{ inputs.component == 'cuda-bindings' }}
        uses: pypa/cibuildwheel@298ed2fb2c105540f5ed055e8a6ad78d82dd3a7e  # v3.3.1
        with:
          package-dir: ./cuda_bindings/
          output-dir: ${{ env.CUDA_BINDINGS_ARTIFACTS_DIR }}
        env:
          CIBW_BUILD: ${{ env.CIBW_BUILD }}
          CIBW_ENVIRONMENT_LINUX: >
            CUDA_PATH=/host/${{ env.CUDA_PATH }}
            CUDA_PYTHON_PARALLEL_LEVEL=${{ env.CUDA_PYTHON_PARALLEL_LEVEL }}
            CC="/host/${{ env.SCCACHE_PATH }} cc"
            CXX="/host/${{ env.SCCACHE_PATH }} c++"
            SCCACHE_GHA_ENABLED=true
            ACTIONS_RUNTIME_TOKEN=${{ env.ACTIONS_RUNTIME_TOKEN }}
            ACTIONS_RUNTIME_URL=${{ env.ACTIONS_RUNTIME_URL }}
            ACTIONS_RESULTS_URL=${{ env.ACTIONS_RESULTS_URL }}
            ACTIONS_CACHE_URL=${{ env.ACTIONS_CACHE_URL }}
            ACTIONS_CACHE_SERVICE_V2=${{ env.ACTIONS_CACHE_SERVICE_V2 }}
            SCCACHE_DIR=/host/${{ env.SCCACHE_DIR }}
            SCCACHE_CACHE_SIZE=${{ env.SCCACHE_CACHE_SIZE }}
          CIBW_ENVIRONMENT_WINDOWS: >
            CUDA_PATH="$(cygpath -w ${{ env.CUDA_PATH }})"
            CUDA_PYTHON_PARALLEL_LEVEL=${{ env.CUDA_PYTHON_PARALLEL_LEVEL }}
          CIBW_BEFORE_TEST_LINUX: >
            "/host/${{ env.SCCACHE_PATH }}" --show-stats
          CIBW_TEST_COMMAND: >
            echo "ok!"

      - name: List and fix ownership of cuda.bindings artifacts
        if: ${{ inputs.component == 'cuda-bindings' }}
        run: |
          if [[ "${{ inputs.host-platform }}" == win* ]]; then
            chown -R "$(whoami)" "${{ env.CUDA_BINDINGS_ARTIFACTS_DIR }}"
          else
            sudo chown -R "$(whoami)" "${{ env.CUDA_BINDINGS_ARTIFACTS_DIR }}"
          fi
          ls -lahR "${{ env.CUDA_BINDINGS_ARTIFACTS_DIR }}"

      - name: Check cuda.bindings wheel
        if: ${{ inputs.component == 'cuda-bindings' }}
        run: twine check --strict "${{ env.CUDA_BINDINGS_ARTIFACTS_DIR }}"/*.whl

      - name: Upload cuda.bindings wheel artifact
        if: ${{ inputs.component == 'cuda-bindings' }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: ${{ env.CUDA_BINDINGS_ARTIFACT_NAME }}
          path: ${{ env.CUDA_BINDINGS_ARTIFACTS_DIR }}/*.whl
          if-no-files-found: error

      - name: Build cuda-python wheel
        if: ${{ inputs.component == 'cuda-bindings' && strategy.job-index == 0 && inputs.host-platform == 'linux-64' }}
        run: |
          pushd cuda_python
          pip wheel -v --no-deps .
          twine check --strict *.whl
          sudo chown -R "$(whoami)" *.whl
          ls -lahR .
          popd

      - name: Upload cuda-python wheel artifact
        if: ${{ inputs.component == 'cuda-bindings' && strategy.job-index == 0 && inputs.host-platform == 'linux-64' }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: cuda-python-wheel
          path: cuda_python/*.whl
          if-no-files-found: error
