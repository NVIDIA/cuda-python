version: 2
updates:
  # Python test-dependency updates for cuda_bindings
  - package-ecosystem: pip
    directory: /cuda_bindings
    schedule:
      interval: "monthly"
      time: "09:00"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 5
    groups:
      test-deps:
        applies-to: version-updates
        patterns: ["*"]
        update-types: ["major", "minor", "patch"]

  # Python test-dependency updates for cuda_core
  - package-ecosystem: pip
    directory: /cuda_core
    schedule:
      interval: "monthly"
      time: "09:00"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 5
    groups:
      test-deps:
        applies-to: version-updates
        patterns: ["*"]
        update-types: ["major", "minor", "patch"]

  # Python test-dependency updates for cuda_pathfinder
  - package-ecosystem: pip
    directory: /cuda_pathfinder
    schedule:
      interval: "monthly"
      time: "09:00"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 5
    groups:
      test-deps:
        applies-to: version-updates
        patterns: ["*"]
        update-types: ["major", "minor", "patch"]

  # GitHub Actions updates targeting the default branch (main)
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: "monthly"
      time: "09:00"
      timezone: "America/Los_Angeles"

    # Keep churn down: only one open PR from this ecosystem at a time
    open-pull-requests-limit: 1

    groups:
      actions-monthly:
        applies-to: version-updates
        patterns: ["*"]
        update-types: ["major", "minor", "patch"]

  # GitHub Actions updates targeting the 12.9.x branch
  - package-ecosystem: github-actions
    directory: /
    target-branch: "12.9.x"  # keep in sync with backport_branch in ci/versions.yml
    schedule:
      interval: "monthly"
      time: "09:00"
      timezone: "America/Los_Angeles"

    # Keep churn down: only one open PR from this ecosystem at a time
    open-pull-requests-limit: 1

    groups:
      actions-monthly:
        applies-to: version-updates
        patterns: ["*"]
        update-types: ["major", "minor", "patch"]
