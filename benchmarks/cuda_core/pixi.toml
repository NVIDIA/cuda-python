[workspace]
channels = ["conda-forge"]
platforms = ["linux-64"]
preview = ["pixi-build"]
channel-priority = "disabled"

[feature.cu13.system-requirements]
cuda = "13"

[feature.cu13-pinned.dependencies]
cuda-version = "13.1.*"

[feature.cu13-source.dependencies]
cuda-version = "13.*"

[feature.bench.dependencies]
python = "3.14.*"
pyperf = "*"
numpy = "*"

[feature.dev.dependencies]
pre-commit = "*"

# Wheel environment: released cuda-core from conda-forge.
[feature.core-wheel.dependencies]
cuda-core = "==0.7.0"

# Source environment: build cuda-core + cuda-bindings from the in-tree
# sources so local changes are exercised. Mirrors cuda_core/pixi.toml.
[feature.core-source.dependencies]
cuda-core = { path = "../../cuda_core" }
cuda-bindings = { path = "../../cuda_bindings" }

[environments]
wheel = { features = ["cu13", "cu13-pinned", "bench", "dev", "core-wheel"] }
source = { features = ["cu13", "cu13-source", "bench", "dev", "core-source"] }

[target.linux.tasks.bench]
cmd = ["python", "$PIXI_PROJECT_ROOT/run_pyperf.py"]

[target.linux.tasks.bench-smoke-test]
cmd = ["python", "$PIXI_PROJECT_ROOT/run_pyperf.py", "--debug-single-value"]

[target.linux.tasks.bench-compare]
cmd = ["python", "$PIXI_PROJECT_ROOT/compare.py"]

[target.linux.tasks.lint]
cmd = ["pre-commit", "run", "--all-files"]
