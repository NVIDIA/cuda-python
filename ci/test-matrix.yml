#
# Test matrix configurations for CUDA Python CI workflows. This file consolidates
# the test matrices that were previously hardcoded in the workflow files. All GPU
# and ARCH values are hard-coded for each architecture: l4 GPU for amd64, a100 GPU
# for arm64.
#
# Please keep the matrices sorted in ascending order by the following:
#
# [ARCH, PY_VER, CUDA_VER, LOCAL_CTK, GPU, GPU_COUNT, DRIVER]
#
# Windows entries also include DRIVER_MODE.
#
# Notes:
# - DRIVER: 'earliest' does not work with CUDA 12.9.1

linux:
  pull-request:
    # TODO: temporarily reduced to single entry per platform for namespace package diagnostic
    - { ARCH: 'amd64', PY_VER: '3.12',  CUDA_VER: '13.2.0', LOCAL_CTK: '0', GPU: 'l4',         GPU_COUNT: '1', DRIVER: 'latest' }
    - { ARCH: 'arm64', PY_VER: '3.12',  CUDA_VER: '13.2.0', LOCAL_CTK: '0', GPU: 'a100',       GPU_COUNT: '1', DRIVER: 'latest' }
  nightly: []

windows:
  pull-request:
    # TODO: temporarily reduced to single entry for namespace package diagnostic
    - { ARCH: 'amd64', PY_VER: '3.12',  CUDA_VER: '13.2.0', LOCAL_CTK: '1', GPU: 'a100',       GPU_COUNT: '1', DRIVER: 'latest', DRIVER_MODE: 'TCC' }
  nightly: []
