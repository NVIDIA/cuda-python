#
# Test matrix configurations for CUDA Python CI workflows. This file consolidates
# the test matrices that were previously hardcoded in the workflow files. All GPU
# and ARCH values are hard-coded for each architecture: various GPUs for amd64,
# alternating a100/l4 for arm64.
#
# Please keep the matrices sorted in ascending order by the following:
#
# [ARCH, PY_VER, CUDA_VER, LOCAL_CTK, GPU, GPU_COUNT, DRIVER]
#
# Windows entries also include DRIVER_MODE.
#
# Notes:
# - DRIVER accepts:
#     * 'latest'   - use the runner's pre-installed latest driver (no install step)
#     * 'earliest' - use the runner's pre-installed earliest driver (no install step)
#     * a version string (e.g. '580.65.06')
#                  - install that version via ci/tools/install_gpu_driver.sh (Linux)
#                    or ci/tools/install_gpu_driver.ps1 (Windows) at the start of the
#                    job. The matrix row is routed to the 'latest' runner image (the
#                    install scripts swap the driver themselves).
# - DRIVER: 'earliest' does not work with CUDA 12.9.1
# - DRIVER: a custom version is not supported with FLAVOR=wsl on Linux.
# - ENV: optional map of extra environment variables to inject into the test
#         job. Every key/value pair is written to GITHUB_ENV after the standard
#         environment-variable setup step, so the variables are visible to all
#         subsequent steps (including the cuda.bindings and cuda.core test
#         steps). Nightly rows also use ENV.MODE as a matrix-filter tag (see
#         ci-nightly.yml). Examples:
#           ENV: { CUDA_PYTHON_CUDA_PER_THREAD_DEFAULT_STREAM: '1' }
#           ENV: { MODE: 'nightly-pytorch', TORCH_VER: '2.12.1', TORCH_CUDA: 'cu126' }

